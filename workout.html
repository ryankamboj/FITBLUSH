<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FITBLUSH — Workout</title>
  <link rel="stylesheet" href="style.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3664134291252435"
     crossorigin="anonymous"></script>
  <style>
    /* Prevent overflow during workout */
    body {
      overflow: hidden;
    }

    .workout-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Top progress */
    .workout-header {
      padding: 16px 0 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .workout-counter {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-3);
    }

    .quit-btn {
      font-size: 0.85rem;
      color: var(--text-3);
      font-weight: 600;
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      background: var(--glass);
      transition: all var(--transition);
    }

    .quit-btn:hover {
      color: #ff5050;
    }

    /* Main workout area */
    .workout-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 20px 0 100px;
      text-align: center;
    }

    .workout-badge {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent-orange);
    }

    .set-indicators {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .reps-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .reps-display .reps-num {
      font-family: var(--font-head);
      font-size: clamp(2.5rem, 12vw, 3.5rem);
      font-weight: 800;
      color: var(--accent-blue);
      line-height: 1;
    }

    .reps-display .reps-label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-3);
    }

    .divider-line {
      width: 60px;
      height: 2px;
      background: var(--glass-border);
      border-radius: 100px;
    }

    .next-up {
      padding: 12px 20px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      width: 100%;
      text-align: left;
    }

    .next-up .nu-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-3);
      margin-bottom: 4px;
    }

    .next-up .nu-name {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-2);
    }

    /* Control Bar */
    .control-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      padding: 12px 20px 30px;
      background: linear-gradient(to top, var(--bg) 75%, transparent);
      z-index: 50;
    }

    .controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .ctrl-btn {
      flex: 1;
      padding: 14px 10px;
      border-radius: var(--radius-md);
      font-weight: 700;
      font-size: 0.85rem;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition);
      border: 1px solid var(--glass-border);
      background: var(--glass-2);
      color: var(--text);
    }

    .ctrl-btn:hover {
      background: var(--glass-border);
    }

    .ctrl-btn:active {
      transform: scale(0.96);
    }

    .ctrl-btn.primary {
      background: var(--accent-blue);
      border-color: transparent;
      color: #fff;
      flex: 1.5;
      box-shadow: 0 4px 16px rgba(79, 156, 249, 0.3);
    }

    .ctrl-btn.danger {
      background: var(--accent-orange-dim);
      border-color: var(--accent-orange);
      color: var(--accent-orange);
    }

    /* Workout timer (global) */
    .global-timer {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-3);
      font-family: var(--font-head);
    }

    /* REST OVERLAY */
    .rest-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(20px);
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      padding: 20px;
    }

    .rest-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .rest-ring-wrap {
      position: relative;
      width: 200px;
      height: 200px;
    }

    .rest-ring-wrap svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .rest-ring-inner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .rest-label-sm {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent-orange);
    }

    .rest-num {
      font-family: var(--font-head);
      font-size: 4rem;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
    }

    .rest-sub {
      font-size: 0.75rem;
      color: var(--text-3);
      font-weight: 600;
    }

    .skip-rest-btn {
      padding: 12px 32px;
      background: var(--glass-2);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--text-2);
      cursor: pointer;
      transition: all var(--transition);
    }

    .skip-rest-btn:hover {
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.2);
    }

    /* COMPLETE */
    .workout-complete {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 100vh;
      gap: 20px;
      padding: 40px 0;
    }

    .workout-complete.show {
      display: flex;
    }

    #workout-active.hidden {
      display: none !important;
    }
  </style>
</head>

<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <!-- ACTIVE WORKOUT -->
  <div class="app-container workout-page" id="workout-active">

    <!-- Header -->
    <div class="workout-header">
      <div>
        <div class="workout-counter" id="ex-counter">Exercise 1 / 1</div>
        <div class="global-timer" id="global-timer">00:00</div>
      </div>
      <button class="quit-btn" onclick="confirmQuit()">End</button>
    </div>

    <!-- Progress bar -->
    <div class="progress-bar" style="margin-bottom:4px">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>

    <!-- Main -->
    <div class="workout-main">
      <div class="workout-badge" id="set-badge">SET 1 OF 3</div>

      <div class="workout-exercise-name" id="ex-name">Exercise Name</div>
      <span class="badge badge-glass" id="ex-muscle">Muscle</span>

      <div class="divider-line"></div>

      <!-- Set dots -->
      <div class="set-indicators" id="set-dots"></div>

      <!-- Reps -->
      <div class="reps-display">
        <div class="reps-num" id="reps-num">10</div>
        <div class="reps-label">Reps</div>
      </div>

      <!-- Up next -->
      <div class="next-up" id="next-up">
        <div class="nu-label">Up Next</div>
        <div class="nu-name" id="next-name">—</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="control-bar">
      <div class="controls-row">
        <button class="ctrl-btn" id="pause-btn" onclick="togglePause()">⏸ Pause</button>
        <button class="ctrl-btn primary" onclick="completeSet()">✓ Done Set</button>
        <button class="ctrl-btn" onclick="skipExercise()">Skip →</button>
      </div>
    </div>
  </div>

  <!-- REST OVERLAY -->
  <div class="rest-overlay" id="rest-overlay">
    <div class="rest-label-sm">Rest Time</div>
    <div class="rest-ring-wrap">
      <svg viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="88" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="10" />
        <circle cx="100" cy="100" r="88" fill="none" stroke="var(--accent-orange)" stroke-width="10"
          stroke-linecap="round" stroke-dasharray="553" stroke-dashoffset="0" id="rest-arc" />
      </svg>
      <div class="rest-ring-inner">
        <div class="rest-label-sm">REST</div>
        <div class="rest-num" id="rest-num">60</div>
        <div class="rest-sub">seconds</div>
      </div>
    </div>
    <div style="font-size:0.9rem;color:var(--text-2)" id="rest-next-label">Next up: —</div>
    <button class="skip-rest-btn" onclick="skipRest()">Skip Rest</button>
  </div>

  <!-- WORKOUT COMPLETE -->
  <div class="workout-complete" id="workout-complete">
    <div class="complete-icon">🔥</div>
    <div style="font-family:var(--font-head);font-size:2rem;font-weight:800">Workout Done!</div>
    <p style="color:var(--text-2);font-size:0.95rem">You crushed it. Recovery starts now.</p>
    <div class="stat-grid" style="width:100%;max-width:340px">
      <div class="stat-box orange">
        <div class="val" id="fin-time">00:00</div>
        <div class="lbl">Duration</div>
      </div>
      <div class="stat-box blue">
        <div class="val" id="fin-sets">0</div>
        <div class="lbl">Total Sets</div>
      </div>
      <div class="stat-box">
        <div class="val" id="fin-exs">0</div>
        <div class="lbl">Exercises</div>
      </div>
      <div class="stat-box">
        <div class="val" id="fin-vol">0</div>
        <div class="lbl">Reps Done</div>
      </div>
    </div>
    <div class="quote-bar" style="width:100%;max-width:340px">
      <p style="font-style:italic;color:var(--text-2)" id="fin-quote"></p>
    </div>
    <div style="display:flex;gap:10px;width:100%;max-width:340px">
      <a href="index.html" class="btn btn-secondary" style="flex:1">Home</a>
      <a href="builder.html" class="btn btn-primary" style="flex:1">New Workout</a>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    /* ─ State ──────────────────────────────────────────── */
    const session = WorkoutStore.getSession();
    if (!session || !session.exercises || !session.exercises.length) {
      location.href = 'builder.html';
    }

    const exercises = session.exercises;
    let exIdx = 0;   // current exercise index
    let setIdx = 0;   // current set index (0-based)
    let paused = false;
    let globalSecs = 0;
    let globalInterval = null;
    let restSecs = 0;
    let restTotal = 0;
    let restInterval = null;
    let totalSetsDone = 0;
    let totalRepsDone = 0;
    const CIRC = 2 * Math.PI * 88; // ~553

    /* ─ Global clock ───────────────────────────────────── */
    function startGlobalTimer() {
      globalInterval = setInterval(() => {
        if (!paused) {
          globalSecs++;
          document.getElementById('global-timer').textContent = formatTime(globalSecs);
        }
      }, 1000);
    }

    /* ─ Render current exercise ─────────────────────────── */
    function renderExercise() {
      if (exIdx >= exercises.length) { finishWorkout(); return; }
      const ex = exercises[exIdx];
      const totalEx = exercises.length;
      const totalSet = ex.sets;

      document.getElementById('ex-counter').textContent = `Exercise ${exIdx + 1} / ${totalEx}`;
      document.getElementById('ex-name').textContent = ex.name;
      document.getElementById('ex-muscle').textContent = ex.muscle;
      document.getElementById('set-badge').textContent = `SET ${setIdx + 1} OF ${totalSet}`;
      document.getElementById('reps-num').textContent = ex.reps || '—';

      // Progress bar
      const totalSetsAll = exercises.reduce((s, e) => s + e.sets, 0);
      const doneSetsAll = exercises.slice(0, exIdx).reduce((s, e) => s + e.sets, 0) + setIdx;
      document.getElementById('progress-fill').style.width = `${(doneSetsAll / totalSetsAll) * 100}%`;

      // Set dots
      const dots = document.getElementById('set-dots');
      dots.innerHTML = Array.from({ length: totalSet }, (_, i) => `
        <div class="set-bubble ${i < setIdx ? 'done' : i === setIdx ? 'active' : ''}">${i + 1}</div>
      `).join('');

      // Next up
      const nextEl = document.getElementById('next-name');
      const nextUp = document.getElementById('next-up');
      if (setIdx + 1 < totalSet) {
        nextEl.textContent = `Set ${setIdx + 2} of ${totalSet}`;
        nextUp.style.display = 'block';
      } else if (exIdx + 1 < exercises.length) {
        nextEl.textContent = exercises[exIdx + 1].name;
        nextUp.style.display = 'block';
      } else {
        nextUp.style.display = 'none';
      }
    }

    /* ─ Complete a set ──────────────────────────────────── */
    function completeSet() {
      if (paused) return;
      const ex = exercises[exIdx];
      totalSetsDone++;
      totalRepsDone += (ex.reps || 0);

      setIdx++;
      if (setIdx >= ex.sets) {
        // Move to next exercise
        exIdx++;
        setIdx = 0;
        if (exIdx >= exercises.length) { finishWorkout(); return; }
      }

      // Show rest
      const restTime = ex.rest || 60;
      startRest(restTime);
    }

    /* ─ REST ────────────────────────────────────────────── */
    function startRest(secs) {
      restSecs = secs;
      restTotal = secs;
      document.getElementById('rest-num').textContent = restSecs;
      updateRestArc(restSecs, restTotal);

      const nextEx = exIdx < exercises.length ? exercises[exIdx] : null;
      document.getElementById('rest-next-label').textContent =
        nextEx ? `Next up: ${nextEx.name}` : 'Last set done!';

      document.getElementById('rest-overlay').classList.add('active');

      restInterval = setInterval(() => {
        if (paused) return;
        restSecs--;
        document.getElementById('rest-num').textContent = Math.max(0, restSecs);
        updateRestArc(restSecs, restTotal);
        if (restSecs <= 0) {
          clearInterval(restInterval);
          document.getElementById('rest-overlay').classList.remove('active');
          renderExercise();
        }
      }, 1000);
    }

    function updateRestArc(secs, total) {
      const pct = total > 0 ? Math.max(0, secs / total) : 0;
      const offset = CIRC * (1 - pct);
      document.getElementById('rest-arc').style.strokeDashoffset = offset;
    }

    function skipRest() {
      clearInterval(restInterval);
      document.getElementById('rest-overlay').classList.remove('active');
      renderExercise();
    }

    /* ─ Skip exercise ───────────────────────────────────── */
    function skipExercise() {
      clearInterval(restInterval);
      document.getElementById('rest-overlay').classList.remove('active');
      exIdx++;
      setIdx = 0;
      renderExercise();
    }

    /* ─ Pause / Resume ──────────────────────────────────── */
    function togglePause() {
      paused = !paused;
      document.getElementById('pause-btn').textContent = paused ? '▶ Resume' : '⏸ Pause';
    }

    /* ─ Quit ────────────────────────────────────────────── */
    function confirmQuit() {
      if (confirm('End this workout?')) {
        clearInterval(globalInterval);
        clearInterval(restInterval);
        finishWorkout();
      }
    }

    /* ─ Finish ──────────────────────────────────────────── */
    function finishWorkout() {
      clearInterval(globalInterval);
      clearInterval(restInterval);
      document.getElementById('rest-overlay').classList.remove('active');
      document.getElementById('workout-active').classList.add('hidden');

      const comp = document.getElementById('workout-complete');
      comp.classList.add('show');
      document.getElementById('fin-time').textContent = formatTime(globalSecs);
      document.getElementById('fin-sets').textContent = totalSetsDone;
      document.getElementById('fin-exs').textContent = exIdx;
      document.getElementById('fin-vol').textContent = totalRepsDone;
      document.getElementById('fin-quote').textContent = randomQuote();
      document.body.style.overflow = '';

      WorkoutStore.addHistory({
        name: session.name,
        exercises: exercises.length,
        totalSets: totalSetsDone,
        duration: globalSecs,
        reps: totalRepsDone
      });
    }

    /* ─ INIT ────────────────────────────────────────────── */
    renderExercise();
    startGlobalTimer();
  </script>
</body>

</html>
